services:
  api:
    build:
      context: .
      dockerfile: src/Stockly.API/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT
      - ConnectionStrings__Default
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17
    environment:
      POSTGRES_DB: stockly
      POSTGRES_USER: ${POSTGRES_USER:-stockly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockly}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stockly} -d stockly"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
